name: stats_app
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.9.1
  get: ^4.6.6
  shimmer: ^3.0.0
  fl_chart: ^1.1.0
  google_fonts: ^6.2.1
  intl: ^0.20.1
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png

# ✅ App Icon
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

# ✅ Splash Screen
flutter_native_splash:
  color: "#0D0D0D"   # background color (change if needed)
  image: assets/logo.png

  android: true
  ios: true

  android_12:
    image: assets/logo.png
    color: "#0D0D0D"